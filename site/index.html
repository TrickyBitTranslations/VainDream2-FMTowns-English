<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vain Dream II — English Translation</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="title">
    <h1>Vain Dream II <span>English translation project</span></h1>
    <a class="gh" href="https://github.com/TrickyBitTranslations/VainDream2-FMTowns-English">GitHub</a>
  </div>
  <div class="progress-wrap">
    <div class="progress"><div id="overall-bar"></div></div>
    <div id="overall-text">loading…</div>
  </div>
</header>

<nav id="tabs"></nav>

<main>
  <div class="toolbar">
    <input id="search" type="search" placeholder="Search lines (Japanese or English)…">
    <label class="untr"><input type="checkbox" id="only-untranslated"> untranslated only</label>
  </div>
  <div id="content"><p class="dim">Loading script…</p></div>
</main>

<footer>
  <p>Vain Dream II © 1993 Glodia — 
  (<a href="https://www.quarter-dev.info/v2/">quarter-dev.info</a>).
  Wanna to help? Pick an untranslated line and hit <b>Suggest</b> - it opens a
  prefilled GitHub issue and a bot checks your line fits the game.
  See the <a href="https://github.com/TrickyBitTranslations/VainDream2-FMTowns-English/blob/main/CONTRIBUTING.md">contributor guide</a>.</p>
</footer>

<script src="app.js"></script>
</body>
</html>
